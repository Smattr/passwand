name: Github Actions CI
permissions: {}
on:
  pull_request:
    branches:
      - main
jobs:
  freebsd15:
    name: FreeBSD 15.0
    runs-on: ubuntu-24.04
    steps:
    - uses: vmactions/freebsd-vm@7ca82f79fe3078fecded6d3a2bff094995447bbd
      with:
        sync: no
        release: "15.0"
        usesh: true
        run: |
          set -e
          set -o pipefail
          set -u
          set -x
          uname -rms
          pkg install -y base64 cmake git json-c openssl pkgconf python3 py311-pexpect py311-pytest scrypt vim
          python3 --version
          git clone --no-checkout -- ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY} wd
          cd wd
          git fetch -- origin ${{ github.event.pull_request.head.sha }}
          git checkout FETCH_HEAD
          export CFLAGS="-Werror -g -fno-omit-frame-pointer -fsanitize=address,undefined -fno-sanitize-recover=address,undefined"
          export UBSAN_OPTIONS=print_stacktrace=1
          cmake -DENABLE_GUI=OFF -B build -S .
          cmake --build build
          cmake --build build --target check
          cmake --install build

  ubuntu2404_nogui:
    name: Ubuntu 24.04, no GTK
    runs-on: ubuntu-24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      CFLAGS: -Werror -g -fno-omit-frame-pointer -fsanitize=address,undefined -fno-sanitize-recover=address,undefined
      UBSAN_OPTIONS: print_stacktrace=1
    steps:
      - run: uname -rms
      - run: python3 --version
      - run: sudo apt-get update
      - run: sudo apt-get install --no-install-recommends -y cmake libjson-c-dev libscrypt-kdf1 libscrypt-kdf-dev python3-pexpect python3-pytest xxd
      - run: echo "cloning ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
      - run: git clone --no-checkout -- ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY} wd
      - run: cd wd && git fetch -- origin ${{ github.event.pull_request.head.sha }} && git checkout FETCH_HEAD
      - run: cmake -DENABLE_GUI=OFF -B build -S wd
      - run: cmake --build build
      - run: cmake --build build --target check
      - run: sudo cmake --install build
